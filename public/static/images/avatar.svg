<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B365D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A4A7F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F4ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8E6D8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)"/>
  <!-- AI/robot icon - simplified brain/circuit design -->
  <g transform="translate(60,60)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="12" fill="url(#iconGrad)"/>
    <!-- Orbiting nodes -->
    <circle cx="-22" cy="-18" r="6" fill="url(#iconGrad)"/>
    <circle cx="22" cy="-18" r="6" fill="url(#iconGrad)"/>
    <circle cx="-22" cy="18" r="6" fill="url(#iconGrad)"/>
    <circle cx="22" cy="18" r="6" fill="url(#iconGrad)"/>
    <!-- Connection lines -->
    <line x1="-10" y1="-8" x2="-18" y2="-14" stroke="url(#iconGrad)" stroke-width="2"/>
    <line x1="10" y1="-8" x2="18" y2="-14" stroke="url(#iconGrad)" stroke-width="2"/>
    <line x1="-10" y1="8" x2="-18" y2="14" stroke="url(#iconGrad)" stroke-width="2"/>
    <line x1="10" y1="8" x2="18" y2="14" stroke="url(#iconGrad)" stroke-width="2"/>
    <!-- Outer ring connections -->
    <line x1="-22" y1="-18" x2="22" y2="-18" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.5"/>
    <line x1="-22" y1="18" x2="22" y2="18" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.5"/>
    <line x1="-22" y1="-18" x2="-22" y2="18" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.5"/>
    <line x1="22" y1="-18" x2="22" y2="18" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
